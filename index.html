<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор тату</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f3f3f3, #ffd6e7);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

h1 { text-align: center; }

label {
    font-weight: bold;
    font-size: 14px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff7eb3, #ff4d8d);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    padding: 15px;
    background: #f8f8f8;
    border-radius: 10px;
    text-align: center;
    display: none;
}

.tg-btn, .vk-btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

.tg-btn {
    background: #eee;
    color: #333;
}

.vk-btn {
    background: #e7f0ff;
    color: #2b5dab;
}

.note {
    font-size: 12px;
    margin-top: 10px;
    color: #666;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор тату 💖</h1>

<label>Размер (см):</label>
<input type="number" id="size" oninput="toggleProject()">

<label>Стиль:</label>
<select id="style">
<option>Минимализм</option>
<option>Файнлайн</option>
<option>Графика</option>
<option>Гравюра</option>
<option>Трайбл</option>
<option>Неотрад</option>
<option>Япония</option>
<option>Грейвош</option>
<option>Орнаментал</option>
</select>

<label>Цвет:</label>
<select id="type">
<option>ЧБ</option>
<option>Цвет</option>
</select>

<div id="normalPlace">
<label>Место:</label>
<select id="place">
<option value="предплечье">Предплечье</option>
<option value="плечо">Плечо</option>
<option value="икра">Икра</option>
<option value="бедро">Бедро</option>
<option value="грудь">Грудь</option>
<option value="рёбра">Рёбра</option>
<option value="шея">Шея</option>
<option value="кисть">Кисть</option>
</select>
</div>

<div id="bigProject" style="display:none;">
<label>Крупный проект:</label>
<select id="project">
<option value="45000">Рукав</option>
<option value="25000">Полурукав</option>
<option value="50000">Ногав</option>
<option value="35000">Полуногав</option>
<option value="57000">Спина</option>
<option value="24000">Грудь</option>
</select>
</div>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

<div class="note">
***Расчёт является предварительным. Итоговая стоимость зависит от деталей, расположения и сложности работы.
</div>

<a id="tgLink" href="https://t.me/pinchyou" target="_blank" class="tg-btn">
Написать мастеру @pinchyou
</a>

<a href="https://vk.ru/pinchyou" target="_blank" class="vk-btn">
Написать в VK
</a>

</div>

<script>
function toggleProject() {
    const size = parseFloat(document.getElementById('size').value);

    if (size > 40) {
        document.getElementById('bigProject').style.display = 'block';
        document.getElementById('normalPlace').style.display = 'none';
    } else {
        document.getElementById('bigProject').style.display = 'none';
        document.getElementById('normalPlace').style.display = 'block';
    }
}

function calculate() {
    const size = parseFloat(document.getElementById('size').value);
    const style = document.getElementById('style').value;
    const color = document.getElementById('type').value;

    if (!size || size <= 0) {
        alert('Введите размер!');
        return;
    }

    let base = 0;

    if (size > 40) {
        base = parseInt(document.getElementById('project').value);
    } else {
        if (size <= 5) base = 1000;
        else if (size <= 10) base = 3000;
        else if (size <= 15) base = 4500;
        else if (size <= 20) base = 6000;
        else if (size <= 30) base = 8000;
        else base = 10000;
    }

    const styleCoeffs = {
        "Минимализм": 1.0,
        "Файнлайн": 1.2,
        "Графика": 1.4,
        "Гравюра": 1.4,
        "Трайбл": 1.4,
        "Неотрад": 1.5,
        "Япония": 1.7,
        "Грейвош": 1.8,
        "Орнаментал": 1.8
    };

    const colorCoeffs = {
        "ЧБ": 1.0,
        "Цвет": 1.25
    };

    let price = base *
        (styleCoeffs[style] || 1) *
        (colorCoeffs[color] || 1);

    price = Math.round(price / 500) * 500;

    document.getElementById('result').innerHTML =
        `💰 <strong>${price.toLocaleString('ru-RU')} ₽</strong>`;

    document.getElementById('result').style.display = 'block';

    document.getElementById('tgLink').href =
        "https://t.me/pinchyou?text=" +
        encodeURIComponent(`Хочу тату, примерно ${price}₽`);
}
</script>

</body>
</html>
