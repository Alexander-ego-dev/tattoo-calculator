<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор тату</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #f3f3f3, #ffd6e7);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: 0 auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #444;
}

label {
    font-weight: bold;
    color: #555;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: #fafafa;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff7eb3, #ff4d8d);
    color: white;
    font-size: 18px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
    background: #f9f9f9;
    text-align: center;
    font-size: 24px;
    display: none;
}

.tg-btn {
    display: block;
    text-align: center;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    background: #e6e6e6;
    text-decoration: none;
    color: #333;
    font-weight: bold;
}

.tg-btn:hover {
    background: #dcdcdc;
}
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор тату 💖</h1>

<label>Размер (см):</label>
<input type="number" id="size" placeholder="Например: 12">

<label>Стиль:</label>
<select id="style">
    <option value="0">Минимализм</option>
    <option value="1500">Графика</option>
    <option value="2500">Японская тату</option>
    <option value="4000">Реализм</option>
    <option value="4000">Орнаментал</option>
    <option value="1500">Лайнворк</option>
</select>

<label>Место:</label>
<select id="place">
    <option value="1000">Плечо / предплечье</option>
    <option value="0">Бедро / голень</option>
    <option value="1000">Шея</option>
    <option value="1000">Пальцы</option>
    <option value="0">Рёбра</option>
    <option value="1500">Грудь</option>
</select>

<label>Крупный проект:</label>
<select id="big" onchange="togglePlace()">
    <option value="0">Нет</option>
    <option value="25000">Спина (полностью)</option>
    <option value="15000">Рукав</option>
    <option value="7000">Полурукав</option>
    <option value="25000">Штанина (нога)</option>
</select>

<label>Тип:</label>
<select id="type">
    <option value="0">Чёрно-белая</option>
    <option value="2500">Цветная</option>
</select>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

<a href="https://t.me/pinchyou" target="_blank" class="tg-btn">
    Написать мастеру @pinchyou
</a>

</div>

<script>
function togglePlace() {
    const big = parseInt(document.getElementById('big').value);
    const place = document.getElementById('place');

    if (big > 0) {
        place.disabled = true;
        place.style.opacity = "0.5";
    } else {
        place.disabled = false;
        place.style.opacity = "1";
    }
}

function calculate() {
    const size = parseFloat(document.getElementById('size').value);

    if (!size || size <= 0) {
        alert('Введите размер!');
        return;
    }

    let basePrice = 0;

    if (size <= 5) basePrice = 1000;
    else if (size <= 10) basePrice = 3000;
    else if (size <= 15) basePrice = 4500;
    else if (size <= 20) basePrice = 6000;
    else if (size <= 30) basePrice = 8000;
    else basePrice = 10000;

    const style = parseInt(document.getElementById('style').value);
    const place = parseInt(document.getElementById('place').value);
    const type = parseInt(document.getElementById('type').value);
    const big = parseInt(document.getElementById('big').value);

    let finalPrice = basePrice + style + type + big;

    if (big === 0) {
        finalPrice += place;
    }

    document.getElementById('result').innerHTML = `
        💰 <strong>${finalPrice.toLocaleString('ru-RU')} ₽</strong>
    `;

    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
