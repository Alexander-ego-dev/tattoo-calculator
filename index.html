<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор тату</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #000; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        #result { background: #fff; padding: 20px; border-radius: 5px; margin-top: 20px; text-align: center; font-size: 24px; font-weight: bold; display: none; border-left: 5px solid #000; }
        footer { text-align: center; margin-top: 30px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <h1>Калькулятор стоимости тату</h1>
    <p style="text-align: center; color: #666;">Введи размеры эскиза — получи цену за минуту!</p>
    
    <form id="calcForm">
        <label>Ширина (см):</label>
        <input type="number" id="width" min="1" max="50" value="10">

        <label>Высота (см):</label>
        <input type="number" id="height" min="1" max="50" value="10">

        <label>Сложность/цвет:</label>
        <select id="complexity">
            <option value="150">Простая ч/б (150 руб/см²)</option>
            <option value="200">Детализированная (200 руб/см²)</option>
            <option value="250">Цветная (250 руб/см²)</option>
        </select>

        <label>Зона тела:</label>
        <select id="zone">
            <option value="1.0">Рука/нога/лопатка (x1.0)</option>
            <option value="1.2">Плечо/бедро (x1.2)</option>
            <option value="1.4">Рёбра/ключица (x1.4)</option>
            <option value="1.5">Кисть/стопа (x1.5)</option>
            <option value="1.1">Спина/живот (x1.1)</option>
        </select>

        <label>
            <input type="checkbox" id="sketch"> Эскиз нужен? (+1500 руб)
        </label>

        <button type="button" onclick="calculate()">Рассчитать цену</button>
    </form>
    
    <div id="result"></div>
    
    <footer>© 2026 Тату мастер. Точные цены по эскизу — уточняйте!</footer>

    <script>
        function calculate() {
            const width = parseFloat(document.getElementById('width').value) || 0;
            const height = parseFloat(document.getElementById('height').value) || 0;
            const base = parseFloat(document.getElementById('complexity').value);
            const zone = parseFloat(document.getElementById('zone').value);
            const sketch = document.getElementById('sketch').checked ? 1500 : 0;

            if (width <= 0 || height <= 0) {
                alert('Введи размеры!');
                return;
            }

            const area = width * height;
            let price = area * base * zone + sketch;

            if (area > 100) price *= 1.2;

            const hours = Math.max(1, Math.round(area / 100));

            document.getElementById('result').innerHTML = `
                Общая стоимость: <strong>${Math.round(price).toLocaleString('ru-RU')} ₽</strong><br>
                <small>
                    Площадь: ${area} см² (~${hours} ч работы)<br>
                    Расчёт: ${area} × ${base} × ${zone.toFixed(1)} + ${sketch} ${area > 100 ? '(+20%)' : ''}
                </small>
            `;

            document.getElementById('result').style.display = 'block';
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
