<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор тату</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f3f3f3, #ffd6e7);
        margin: 0;
        padding: 20px;
    }

    .container {
        max-width: 420px;
        margin: 0 auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #444;
        margin-bottom: 10px;
    }

    p {
        text-align: center;
        color: #777;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        color: #555;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 10px 0 20px;
        border-radius: 10px;
        border: 1px solid #ddd;
        background: #fafafa;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff7eb3, #ff4d8d);
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        opacity: 0.9;
    }

    #result {
        margin-top: 20px;
        padding: 20px;
        border-radius: 10px;
        background: #f9f9f9;
        text-align: center;
        font-size: 22px;
        display: none;
    }

    .tg-btn {
        display: block;
        text-align: center;
        margin-top: 15px;
        padding: 12px;
        border-radius: 10px;
        background: #e6e6e6;
        color: #333;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .tg-btn:hover {
        background: #dcdcdc;
    }
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор тату</h1>
<p>Рассчитай стоимость за 10 секунд 💖</p>

<label>Размер тату (см):</label>
<input type="number" id="size" placeholder="Например: 12">

<label>Тип:</label>
<select id="type">
    <option value="bw">Чёрно-белая</option>
    <option value="color">Цветная (+2500 ₽)</option>
</select>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

<a href="https://t.me/pinchyou" target="_blank" class="tg-btn">
    Написать мастеру @pinchyou
</a>

</div>

<script>
function calculate() {
    const size = parseFloat(document.getElementById('size').value);
    const type = document.getElementById('type').value;

    if (!size || size <= 0) {
        alert('Введите размер!');
        return;
    }

    let basePrice = 0;

    if (size <= 5) basePrice = 1000;
    else if (size <= 10) basePrice = 3000;
    else if (size <= 15) basePrice = 4500;
    else if (size <= 20) basePrice = 6000;
    else if (size <= 30) basePrice = 8000;
    else basePrice = 10000;

    let finalPrice = basePrice;

    if (type === 'color') {
        finalPrice += 2500;
    }

    document.getElementById('result').innerHTML = `
        💰 <strong>${finalPrice.toLocaleString('ru-RU')} ₽</strong><br>
        <small>
            База: ${basePrice} ₽<br>
            ${type === 'color' ? '+ Цвет: 2500 ₽' : 'Ч/Б без доплаты'}
        </small>
    `;

    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
