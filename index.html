<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор тату</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f3f3f3, #ffd6e7);
    position: relative;
    overflow-x: hidden;
}

/* 🔥 ФОН С КОТОМ */
body::before {
    content: "";
    position: fixed;
    left: 0;
    top: 0;
    width: 40%;
    height: 100%;
    background: url("cat.jpg") no-repeat center;
    background-size: cover;
    opacity: 0.15;
    z-index: -1;
}

/* КАЛЬКУЛЯТОР */
.container {
    max-width: 420px;
    margin: 0 auto;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
}

label {
    font-weight: bold;
    font-size: 14px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff7eb3, #ff4d8d);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    padding: 15px;
    background: #f8f8f8;
    border-radius: 10px;
    text-align: center;
    display: none;
}

.tg-btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    background: #eee;
    text-decoration: none;
    color: #333;
    font-weight: bold;
}

/* 📱 АДАПТИВ */
@media (max-width: 768px) {
    body::before {
        width: 100%;
        height: 200px;
        opacity: 0.1;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Калькулятор тату 💖</h1>

<label>Размер (см):</label>
<input type="number" id="size">

<label>Стиль:</label>
<select id="style">
<option>Минимализм</option>
<option>Файнлайн</option>
<option>Графика</option>
<option>Гравюра</option>
<option>Трайбл</option>
<option>Неотрад</option>
<option>Япония</option>
<option>Грейвош</option>
<option>Орнаментал</option>
</select>

<label>Место:</label>
<select id="place">
<option value="предплечье">Предплечье</option>
<option value="плечо">Плечо</option>
<option value="икра">Икра</option>
<option value="бедро">Бедро</option>
<option value="грудь">Грудь</option>
<option value="лопатки">Лопатки</option>
<option value="внутренняя_рука">Внутренняя рука</option>
<option value="бок">Бок</option>
<option value="шея">Шея</option>
<option value="кисть">Кисть</option>
<option value="стопа">Стопа</option>
<option value="рёбра">Рёбра</option>
<option value="локоть">Локоть</option>
<option value="колено">Колено</option>
</select>

<label>Цвет:</label>
<select id="type">
<option>ЧБ</option>
<option>Цвет</option>
</select>

<button onclick="calculate()">Рассчитать</button>

<div id="result"></div>

<a id="tgLink" href="https://t.me/pinchyou" target="_blank" class="tg-btn">
Написать мастеру @pinchyou
</a>

</div>

<script>
function calculate() {
    const size = parseFloat(document.getElementById('size').value);
    const style = document.getElementById('style').value;
    const color = document.getElementById('type').value;
    const zone = document.getElementById('place').value;

    if (!size || size <= 0) {
        alert('Введите размер!');
        return;
    }

    if (size > 40) {
        document.getElementById('result').innerHTML =
            "💬 Крупный проект — цена обсуждается индивидуально";

        document.getElementById('result').style.display = 'block';

        document.getElementById('tgLink').href =
            "https://t.me/pinchyou?text=" +
            encodeURIComponent(`Хочу крупную тату ${size}см, стиль ${style}`);

        return;
    }

    let base = 0;
    if (size <= 5) base = 1000;
    else if (size <= 10) base = 2500;
    else if (size <= 15) base = 4000;
    else if (size <= 20) base = 5500;
    else if (size <= 30) base = 7500;
    else base = 11000;

    const styleCoeffs = {
        "Минимализм": 1.0,
        "Файнлайн": 1.2,
        "Графика": 1.4,
        "Гравюра": 1.4,
        "Трайбл": 1.4,
        "Неотрад": 1.5,
        "Япония": 1.7,
        "Грейвош": 1.8,
        "Орнаментал": 1.8
    };

    const colorCoeffs = {
        "ЧБ": 1.0,
        "Цвет": 1.25
    };

    const zoneCoeffs = {
        "предплечье": 1.0,
        "плечо": 1.0,
        "икра": 1.0,
        "бедро": 1.0,
        "грудь": 1.1,
        "лопатки": 1.1,
        "внутренняя_рука": 1.15,
        "бок": 1.15,
        "шея": 1.25,
        "кисть": 1.25,
        "стопа": 1.25,
        "рёбра": 1.25,
        "локоть": 1.25,
        "колено": 1.25
    };

    let price = base *
        (styleCoeffs[style] || 1) *
        (colorCoeffs[color] || 1) *
        (zoneCoeffs[zone] || 1);

    price = Math.round(price / 500) * 500;

    document.getElementById('result').innerHTML =
        `💰 <strong>${price.toLocaleString('ru-RU')} ₽</strong>`;

    document.getElementById('result').style.display = 'block';

    document.getElementById('tgLink').href =
        "https://t.me/pinchyou?text=" +
        encodeURIComponent(`Хочу тату ${size}см, стиль ${style}, примерно ${price}₽`);
}
</script>

</body>
</html>
